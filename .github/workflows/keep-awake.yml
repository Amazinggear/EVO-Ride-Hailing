name: Keep EVO Backend Awake (Backup)

on:
  schedule:
    - cron: '*/7 * * * *' # Runs every 7 minutes (backup pinger)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -s --max-time 30 https://evo-backend-5zsg.onrender.com/health || echo "Ping sent"
