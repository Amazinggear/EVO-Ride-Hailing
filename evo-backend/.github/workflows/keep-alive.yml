name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          echo "Pinging backend to prevent Render sleep..."
          # The actual Render backend URL + /health
          curl -s --max-time 60 https://driver-dispatch-backend-32l4.onrender.com/health || echo "Ping timeout but request sent."
